<!-- InspIRCd Configuration for ZeroClaw Hackerbot -->
<!-- This is a minimal configuration for local testing -->

<config name="network">
  <server name="localhost" id="zeroclaw.local" network="zeroclaw" description="ZeroClaw Hackerbot IRC Server">
  <listen bind="127.0.0.1" port="6667" ssl="none">
</config>

<config name="security">
  <options casemapping="ascii">
  <limits maxchannels="20" maxchannellen="50" maxmodes="20" maxmodesperline="16" nicklen="16" quitlen="300" kicklen="300" topiclen="300" wallopsten="160">
</config>

<config name="logging">
  <log method="file" type="*" level="default" target="/var/log/inspircd/inspircd.log">

<include file="example/modules.conf.example">
<include file="example/commands.conf.example">
